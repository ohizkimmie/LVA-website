<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Liminal Veil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080808;
      color: #EDE8DC;
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 480px; }
    .moon { font-size: 5rem; margin-bottom: 24px; animation: float 5s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    h1 { font-family:'Cinzel',serif; font-size:4rem; color:#C9A84C; letter-spacing:0.1em; margin-bottom:8px; }
    p { font-size:1.15rem; color:rgba(237,232,220,0.65); font-style:italic; margin-bottom:32px; }
    a {
      font-family:'Cinzel',serif;
      font-size:11px;
      letter-spacing:0.2em;
      text-transform:uppercase;
      color:#080808;
      background:linear-gradient(135deg,#8B6A2A,#C9A84C);
      padding:13px 28px;
      border-radius:10px;
      text-decoration:none;
      display:inline-block;
    }
    a:hover { background:linear-gradient(135deg,#C9A84C,#E8C97A); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="moon">🌑</div>
    <h1>404</h1>
    <p>This page lies beyond the veil. Perhaps it was never meant to be found.</p>
    <a href="/">Return to the Threshold</a>
  </div>
</body>
</html>
